name: todo_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  cloud_firestore: ^6.2.0
  firebase_auth: ^6.2.0
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.3
  firebase_ui_auth: ^3.0.1
  firebase_ui_oauth_google: ^2.0.1
  flutter:
    sdk: flutter
  flutter_local_notifications: ^21.0.0
  provider: ^6.1.5+1
  shared_preferences: ^2.5.4
  sqflite: ^2.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/todo.jpg
  fonts:
    - family: Unbounded
      fonts:
        - asset: assets/fonts/Unbounded-VariableFont_wght.ttf
    - family: Georama
      fonts: 
        - asset: assets/fonts/Georama-VariableFont_wdth,wght.ttf     
